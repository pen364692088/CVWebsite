<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phase 2 Capture Helper</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      iframe {
        display: block;
        width: 100vw;
        height: 100vh;
        border: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <iframe id="capture-frame" title="capture"></iframe>
    <script>
      const params = new URLSearchParams(window.location.search);
      const frame = document.getElementById("capture-frame");
      const src = params.get("src");
      const targetId = params.get("target");
      const scrollTop = Number(params.get("scrollTop") || "0");
      const initialDelay = Number(params.get("initialDelay") || "500");

      if (src) {
        frame.src = src;
      }

      frame.addEventListener("load", () => {
        window.setTimeout(() => {
          const childWindow = frame.contentWindow;
          const childDocument = frame.contentDocument;
          if (!childWindow || !childDocument) return;

          const root = childDocument.documentElement;
          const body = childDocument.body;

          if (targetId) {
            const target = childDocument.getElementById(targetId);
            target?.scrollIntoView({ block: "start", behavior: "auto" });
            childWindow.dispatchEvent(new Event("scroll"));
            return;
          }

          childWindow.scrollTo(0, scrollTop);
          root.scrollTop = scrollTop;
          body.scrollTop = scrollTop;
          childWindow.dispatchEvent(new Event("scroll"));
          window.setTimeout(() => {
            childWindow.scrollTo(0, scrollTop);
            root.scrollTop = scrollTop;
            body.scrollTop = scrollTop;
            childWindow.dispatchEvent(new Event("scroll"));
          }, 600);
        }, initialDelay);
      });
    </script>
  </body>
</html>
